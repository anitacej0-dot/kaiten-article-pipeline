extends: substitution
message: "Заимствование «%s» → «%s» (оцените по контексту, редполитика)."
level: warning
ignorecase: true
# Без авто-замены: значение зависит от контекста, решает автор.
swap:
  '\bтаск(а|и|ов|ам|ами|е)?\b': 'задача, карточка'
  '\bфич(а|и|у|ей|ами|е)?\b': 'функция, возможность'
  '\bколл\b': 'звонок, встреча'
  '\bаттач(а|ем|ить|ил)?\b': 'файл, вложение'
  '\bфункционал\b': функциональность
