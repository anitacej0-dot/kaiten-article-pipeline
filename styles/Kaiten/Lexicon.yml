extends: substitution
message: "Редполитика: используйте «%s» вместо «%s»."
level: error
ignorecase: true
action:
  name: replace
# Ключи — регулярки (RE2, без lookahead). Формы перечислены явно,
# чтобы не задеть правильные слова (функциональность, функциональный).
swap:
  '\bфункционал(а|ом|е|у|ы)?\b': функциональность
  'для того[,]?\s+чтобы': чтобы
