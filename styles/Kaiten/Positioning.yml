extends: existence
message: "Ошибка позиционирования: «%s» (см. knowledge/products.md и forbidden_phrases.md)."
level: error
ignorecase: true
# Kaiten — не «трекер задач»; «бесплатный таск-трекер» допустимо только про тариф Free.
tokens:
  - '(Кайтен|Kaiten)[^.!?]{0,30}трекер задач'
  - 'трекер задач[^.!?]{0,30}(Кайтен|Kaiten)'
  - 'бесплатн(ый|ого|ым) таск-трекер'
  - 'сервис для (небольших|маленьких) компаний'
