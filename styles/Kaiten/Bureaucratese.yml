extends: substitution
message: "Канцелярит «%s» → «%s» (редполитика: простота, живые глаголы)."
level: warning
ignorecase: true
swap:
  'в целях': чтобы
  'осуществля(ть|ем|ет|ли)': делать
  'являе(тся|мся)': быть
  'в случае если': если
  'на сегодняшний день': сегодня
  'в связи с тем что': потому что
