<svg width="100%" viewBox="0 0 720 176" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
<title>Как устроен митап: от идеи до работы после</title>
<desc>Шесть шагов в линию: тема, спикеры, площадка, анонс, сам митап и работа после встречи. Узлы «Митап» и «Работа после» выделены фиолетовым.</desc>
<rect width="720" height="176" fill="#ffffff"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="#bdbdbd"/>
  </marker>
</defs>

<!-- стрелки между узлами -->
<g stroke="#e0e0e0" stroke-width="2" marker-end="url(#arrow)">
  <line x1="114" y1="103" x2="126" y2="103"/>
  <line x1="232" y1="103" x2="244" y2="103"/>
  <line x1="350" y1="103" x2="362" y2="103"/>
  <line x1="468" y1="103" x2="480" y2="103"/>
  <line x1="586" y1="103" x2="598" y2="103"/>
</g>

<!-- узлы -->
<!-- 1. Тема -->
<g>
  <rect x="12" y="70" width="100" height="66" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="62" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#2d2d2d">Тема</text>
</g>
<!-- 2. Спикеры -->
<g>
  <rect x="130" y="70" width="100" height="66" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="180" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#2d2d2d">Спикеры</text>
</g>
<!-- 3. Площадка -->
<g>
  <rect x="248" y="70" width="100" height="66" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="298" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#2d2d2d">Площадка</text>
</g>
<!-- 4. Анонс -->
<g>
  <rect x="366" y="70" width="100" height="66" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="416" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#2d2d2d">Анонс</text>
</g>
<!-- 5. Митап (акцент) -->
<g>
  <rect x="484" y="70" width="100" height="66" rx="16" fill="#7d4ccf"/>
  <text x="534" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Митап</text>
</g>
<!-- 6. Работа после (мягкий акцент) -->
<g>
  <rect x="602" y="70" width="106" height="66" rx="16" fill="#efe9f9" stroke="#7d4ccf" stroke-width="1.5"/>
  <text x="655" y="99" text-anchor="middle" font-size="15" font-weight="600" fill="#7d4ccf">Работа</text>
  <text x="655" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="#7d4ccf">после</text>
  <!-- бейдж «часто забывают» -->
  <rect x="596" y="30" width="118" height="24" rx="12" fill="#7d4ccf"/>
  <text x="655" y="46" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">часто забывают</text>
  <path d="M655 54 L649 62 L661 62 Z" fill="#7d4ccf"/>
</g>
</svg>
