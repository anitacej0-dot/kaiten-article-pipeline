<svg width="100%" viewBox="0 0 680 383" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Обложка: митап — разговор на равных</title>
<desc>Небольшой круг равнозначных участников, соединённых между собой связями, и лёгкие реплики между ними. Единственный акцент — фиолетовый.</desc>
<rect width="680" height="383" fill="#ffffff"/>

<!-- связи: кольцо + диагонали «все со всеми» -->
<g stroke-linecap="round" fill="none">
  <!-- кольцо -->
  <path d="M340 99 L470 145" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M470 145 L470 237" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M470 237 L340 283" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M340 283 L210 237" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M210 237 L210 145" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M210 145 L340 99" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- диагонали -->
  <path d="M470 145 L210 237" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M210 145 L470 237" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- акцентные связи от верхнего участника -->
  <path d="M340 99 L340 283" stroke="#7d4ccf" stroke-width="2"/>
  <path d="M340 99 L210 237" stroke="#7d4ccf" stroke-width="2"/>
  <path d="M340 99 L470 237" stroke="#7d4ccf" stroke-width="2"/>
</g>

<!-- участники (аватары): 1 акцентный + 5 нейтральных -->
<!-- n1 top (accent) -->
<g>
  <circle cx="340" cy="99" r="27" fill="#7d4ccf"/>
  <circle cx="340" cy="92" r="8" fill="#ffffff"/>
  <path d="M328 114 C328 101 352 101 352 114 Z" fill="#ffffff"/>
</g>
<!-- n2 -->
<g>
  <circle cx="470" cy="145" r="27" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="470" cy="138" r="8" fill="#bdbdbd"/>
  <path d="M458 160 C458 147 482 147 482 160 Z" fill="#bdbdbd"/>
</g>
<!-- n3 -->
<g>
  <circle cx="470" cy="237" r="27" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="470" cy="230" r="8" fill="#bdbdbd"/>
  <path d="M458 252 C458 239 482 239 482 252 Z" fill="#bdbdbd"/>
</g>
<!-- n4 bottom -->
<g>
  <circle cx="340" cy="283" r="27" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="340" cy="276" r="8" fill="#bdbdbd"/>
  <path d="M328 298 C328 285 352 285 352 298 Z" fill="#bdbdbd"/>
</g>
<!-- n5 -->
<g>
  <circle cx="210" cy="237" r="27" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="210" cy="230" r="8" fill="#bdbdbd"/>
  <path d="M198 252 C198 239 222 239 222 252 Z" fill="#bdbdbd"/>
</g>
<!-- n6 -->
<g>
  <circle cx="210" cy="145" r="27" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="210" cy="138" r="8" fill="#bdbdbd"/>
  <path d="M198 160 C198 147 222 147 222 160 Z" fill="#bdbdbd"/>
</g>

<!-- лёгкие реплики (без текста) -->
<g>
  <rect x="516" y="70" width="96" height="40" rx="14" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M540 110 l0 16 l16 -16 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="536" cy="90" r="4" fill="#7d4ccf"/>
  <rect x="548" y="86" width="48" height="6" rx="3" fill="#eeeeee"/>
  <rect x="548" y="97" width="30" height="6" rx="3" fill="#f0f0f0"/>
</g>
<g>
  <rect x="60" y="268" width="96" height="40" rx="14" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <path d="M132 308 l0 16 l-16 -16 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="80" cy="288" r="4" fill="#bdbdbd"/>
  <rect x="92" y="284" width="48" height="6" rx="3" fill="#eeeeee"/>
  <rect x="92" y="295" width="30" height="6" rx="3" fill="#f0f0f0"/>
</g>
</svg>
